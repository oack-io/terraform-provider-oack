version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gocritic
    - misspell
    - unconvert
    - errorlint
    - exhaustive
    - copyloopvar
    - intrange
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
    paths:
      - docs
      - examples

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - exitAfterDefer

formatters:
  enable:
    - gofmt

output:
  sort-order:
    - file

run:
  go: "1.24"
