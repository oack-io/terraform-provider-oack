version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - gocritic
    - misspell
    - unconvert
    - errorlint
    - exhaustive
    - copyloopvar
    - intrange

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      disabled-checks:
        - exitAfterDefer

formatters:
  enable:
    - gofmt

output:
  sort-order:
    - file

run:
  go: "1.24"

issues:
  exclude-dirs:
    - docs
    - examples
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
